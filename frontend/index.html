<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Modal AI Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 14px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header span { font-size: 0.75rem; color: #888; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.agent {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.agent .label {
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .steps-block {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 10px;
      font-size: 0.78rem;
      color: #aaa;
    }

    .steps-block summary {
      cursor: pointer;
      color: #888;
      font-size: 0.75rem;
      margin-bottom: 4px;
    }

    .steps-block div { margin-top: 6px; line-height: 1.8; }

    .extracted-block {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 8px;
      font-size: 0.78rem;
      color: #aaa;
    }

    .extracted-block summary {
      cursor: pointer;
      color: #888;
      font-size: 0.75rem;
    }

    .clarify-box {
      background: #1c1c1c;
      border: 1px solid #f59e0b;
      border-radius: 10px;
      padding: 12px 16px;
      color: #fcd34d;
      font-size: 0.88rem;
      align-self: flex-start;
      max-width: 80%;
    }

    .thinking {
      align-self: flex-start;
      color: #666;
      font-size: 0.82rem;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #input-area {
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      padding: 16px 24px;
    }

    #file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .file-chip {
      background: #2a2a2a;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-chip button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #query-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
    }

    #query-input:focus { border-color: #2563eb; }

    #file-btn {
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      color: #ccc;
      cursor: pointer;
      font-size: 1rem;
    }

    #file-btn:hover { background: #333; }

    #send-btn {
      background: #2563eb;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }

    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    #file-input { display: none; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🤖 Multi-Modal AI Agent</h1>
    <span>Supports Text · Images · PDFs · Audio</span>
  </div>
</header>

<div id="chat-window">
  <div class="message agent">
    <div class="label">Agent</div>
    👋 Hello! Ask me anything or upload a file if needed.
  </div>
</div>

<div id="input-area">
  <div id="file-preview"></div>
  <div id="input-row">
    <button id="file-btn" onclick="document.getElementById('file-input').click()">📎</button>
    <input type="file" id="file-input" multiple accept=".pdf,.jpg,.jpeg,.png,.mp3,.wav,.m4a" onchange="handleFiles(event)" />
    <textarea id="query-input" placeholder="Ask a question here..." rows="1"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  let selectedFiles = [];

  function handleFiles(event) {
    const newFiles = Array.from(event.target.files);
    selectedFiles = [...selectedFiles, ...newFiles];
    renderFilePreviews();
    event.target.value = "";
  }

  function renderFilePreviews() {
    const preview = document.getElementById("file-preview");
    preview.innerHTML = "";
    selectedFiles.forEach((file, i) => {
      const chip = document.createElement("div");
      chip.className = "file-chip";
      chip.innerHTML = `📄 ${file.name} <button onclick="removeFile(${i})">×</button>`;
      preview.appendChild(chip);
    });
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderFilePreviews();
  }

  function appendMessage(role, html) {
    const chat = document.getElementById("chat-window");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function appendThinking() {
    const chat = document.getElementById("chat-window");
    const div = document.createElement("div");
    div.className = "thinking";
    div.id = "thinking-indicator";
    div.innerText = "⏳ Agent is thinking...";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById("thinking-indicator");
    if (el) el.remove();
  }

  async function sendMessage() {
    const queryInput = document.getElementById("query-input");
    const query = queryInput.value.trim();

    if (!query && selectedFiles.length === 0) return;

    // Show user message
    let userMsg = query || "";
    if (selectedFiles.length > 0) {
      userMsg += (userMsg ? "\n" : "") + selectedFiles.map(f => `📎 ${f.name}`).join("  ");
    }
    appendMessage("user", userMsg.replace(/\n/g, "<br>"));

    queryInput.value = "";
    queryInput.style.height = "auto";

    const btn = document.getElementById("send-btn");
    btn.disabled = true;
    appendThinking();

    // Build form data
    const formData = new FormData();
    formData.append("query", query);
    selectedFiles.forEach(file => formData.append("files", file));
    selectedFiles = [];
    renderFilePreviews();

    try {
      const res = await fetch("/agent", { method: "POST", body: formData });
      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch (parseErr) {
        throw new Error(text.slice(0, 300));
      }
      removeThinking();

      if (data.status === "clarify") {
        const div = document.createElement("div");
        div.className = "clarify-box";
        div.innerHTML = `❓ <strong>Need clarification:</strong><br>${data.question}`;
        document.getElementById("chat-window").appendChild(div);
        document.getElementById("chat-window").scrollTop = 99999;

      } else {
        // Steps trace
        let stepsHtml = "";
        if (data.steps && data.steps.length > 0) {
          stepsHtml = `
            <details class="steps-block">
              <summary>🔍 Agent Plan Trace (${data.steps.length} steps)</summary>
              <div>${data.steps.join("<br>")}</div>
            </details>`;
        }

        // Extracted text
        let extractedHtml = "";
        if (data.extracted_texts && data.extracted_texts.length > 0) {
          const items = data.extracted_texts.map(e =>
            `<strong>${e.source}:</strong><br>${e.text}...`
          ).join("<br><br>");
          extractedHtml = `
            <details class="extracted-block">
              <summary>📄 Extracted Text Preview</summary>
              <div style="margin-top:8px">${items}</div>
            </details>`;
        }

        appendMessage("agent",
          `<div class="label">Agent · ${data.task}</div>` +
          `<div>${data.output.replace(/\n/g, "<br>")}</div>` +
          stepsHtml + extractedHtml
        );
      }

    } catch (err) {
      removeThinking();
      appendMessage("agent", `<div class="label">Error</div>❌ Something went wrong: ${err.message}`);
    }

    btn.disabled = false;
  }
</script>

</body>
</html>
